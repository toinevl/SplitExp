version: "3.8"

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    ports:
      - "10000:10000" # Blob Storage
      - "10001:10001" # Queue Storage
      - "10002:10002" # Table Storage
    environment:
      AZURITE_ACCOUNTS: "devstoreaccount1:Eby8vdM02xNOcqFlqUwJPLlmEtlCDXeOUQi9Sj8L+2E="
    volumes:
      - azurite-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:10002/devstoreaccount1/Tables', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  azurite-data:
